name: ivalid
description: "Ivalid - Plataforma de combate ao desperdício alimentar."
publish_to:

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (equivalentes Kotlin: firebase-bom + ktx modules)
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_database: ^11.1.5
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.1.3

  # State Management
  provider: ^6.1.2

  # Navigation (equivalente: navigation-compose)
  go_router: ^14.2.7

  # Image loading (equivalente: coil-compose)
  cached_network_image: ^3.4.1

  # QR Code (equivalente: zxing-core + zxing-android-embedded)
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Typography
  google_fonts: ^8.0.2

  # Coroutines play-services equivalent (async helpers)
  # Flutter já tem isso built-in via async/await

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
